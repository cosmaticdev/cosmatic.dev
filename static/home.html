            function startTimestampCounter(timestamp) {
                const timeDisplay = document.getElementById('time-display');

                // Convert the timestamp to a Date object
                let localDate = new Date(timestamp);

                // Update the displayed time every second
                function updateTime() {
                    timeDisplay.textContent = localDate.toLocaleTimeString(); // Display the local time
                    localDate.setSeconds(localDate.getSeconds() + 1); // Increment the time by 1 second
                }

                // Start the interval to update time every second
                updateTime(); // Update immediately
                setInterval(updateTime, 1000); // Update every second
            }

            // Example: Provide a timestamp in milliseconds
            const exampleTimestamp = Date.now(); // Replace this with your desired timestamp

            async function loadData() {
                try {

                    console.error('Error fetching JSON:', error);
                }
            }

            async function useData() {
                let data = await loadData();
                console.log(data);
                data.storageDrives.reverse().forEach(drive => {
                    let clonedElement = document.getElementById("drivesItem").cloneNode(true);
                    clonedElement.querySelector("h3").innerText = drive.name + " drive: " + Math.floor(drive.used * 100) / 100 + "GB / " + Math.floor(drive.total * 100) / 100 + "GB (" + drive.percentageUsed + "% full)";

                    document.getElementById("drivesItem").parentNode.insertBefore(clonedElement, document.getElementById("drivesItem").nextSibling);
                });
                document.getElementById("drivesItem").remove();
            }
            useData();
